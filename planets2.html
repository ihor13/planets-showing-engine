<!DOCTYPE html>
<html>
<head>
<title>Solar System Simulator</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#planetMenu{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.6);
padding:12px;
border-radius:10px;
color:white;
}

#planetMenu button{
display:block;
margin:4px;
width:120px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="planetMenu"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
100000
)

camera.position.set(0,600,1200)

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

const controls = new THREE.OrbitControls(camera,renderer.domElement)
controls.enableDamping=true

// LIGHT
const sunLight = new THREE.PointLight(0xffffff,2,0)
scene.add(sunLight)

// SUN

const sun = new THREE.Mesh(
new THREE.SphereGeometry(60,64,64),
new THREE.MeshBasicMaterial({color:0xffcc33})
)

scene.add(sun)


// STARS

const starGeo = new THREE.BufferGeometry()
const starCount = 20000
const positions=[]

for(let i=0;i<starCount;i++){

positions.push(
(Math.random()-0.5)*200000,
(Math.random()-0.5)*200000,
(Math.random()-0.5)*200000
)

}

starGeo.setAttribute('position',new THREE.Float32BufferAttribute(positions,3))

const stars = new THREE.Points(
starGeo,
new THREE.PointsMaterial({color:0xffffff})
)

scene.add(stars)


// PLANET DATA

const planetData=[

{name:"Mercury",size:4,distance:120,speed:0.04,color:0x909090},
{name:"Venus",size:8,distance:180,speed:0.015,color:0xd4af37},
{name:"Earth",size:9,distance:250,speed:0.01,color:0x2a5fff},
{name:"Mars",size:6,distance:320,speed:0.008,color:0xb22222},
{name:"Jupiter",size:25,distance:500,speed:0.002,color:0xd2b48c},
{name:"Saturn",size:22,distance:650,speed:0.0009,color:0xf5deb3},
{name:"Uranus",size:18,distance:780,speed:0.0004,color:0x7fffd4},
{name:"Neptune",size:18,distance:900,speed:0.0003,color:0x4169e1}

]

const planets=[]
const orbits=[]
const menu = document.getElementById("planetMenu")

function createOrbit(radius){

const curve = new THREE.EllipseCurve(
0,0,
radius,radius,
0,2*Math.PI
)

const points = curve.getPoints(128)

const geometry = new THREE.BufferGeometry().setFromPoints(points)

const material = new THREE.LineBasicMaterial({color:0x444444})

const ellipse = new THREE.Line(geometry,material)

ellipse.rotation.x=Math.PI/2

scene.add(ellipse)

return ellipse

}


// CREATE PLANETS

planetData.forEach(data=>{

const planet=new THREE.Mesh(

new THREE.SphereGeometry(data.size,32,32),
new THREE.MeshStandardMaterial({color:data.color})

)

planet.userData=data

scene.add(planet)

const orbit=createOrbit(data.distance)

planets.push(planet)
orbits.push(orbit)

const btn=document.createElement("button")
btn.innerText=data.name

btn.onclick=()=>selectPlanet(planet,orbit)

menu.appendChild(btn)


// SATURN RING

if(data.name==="Saturn"){

const ring=new THREE.Mesh(

new THREE.RingGeometry(30,50,64),
new THREE.MeshBasicMaterial({
color:0xccccaa,
side:THREE.DoubleSide,
transparent:true
})

)

ring.rotation.x=Math.PI/2

planet.add(ring)

}


// ATMOSPHERES

if(data.name==="Earth"||data.name==="Venus"){

const atmosphere=new THREE.Mesh(

new THREE.SphereGeometry(data.size*1.1,32,32),
new THREE.MeshBasicMaterial({
color:0x88ccff,
transparent:true,
opacity:0.2
})

)

planet.add(atmosphere)

}

})


// ASTEROID BELT

function createBelt(inner,outer,count){

for(let i=0;i<count;i++){

const angle=Math.random()*Math.PI*2
const radius=inner+Math.random()*(outer-inner)

const asteroid=new THREE.Mesh(
new THREE.SphereGeometry(1,6,6),
new THREE.MeshStandardMaterial({color:0x888888})
)

asteroid.position.set(
Math.cos(angle)*radius,
(Math.random()-0.5)*10,
Math.sin(angle)*radius
)

scene.add(asteroid)

}

}

createBelt(380,450,2000)
createBelt(1100,1400,3000)


// PLANET SELECT

let selectedPlanet=null

function selectPlanet(planet,orbit){

planets.forEach(p=>p.material.emissive=new THREE.Color(0x000000))
orbits.forEach(o=>o.material.color.set(0x444444))

planet.material.emissive=new THREE.Color(0xffff00)
orbit.material.color.set(0xffff00)

selectedPlanet=planet

controls.target.copy(planet.position)

}


// ANIMATION

let time=0

function animate(){

requestAnimationFrame(animate)

time+=0.01

planets.forEach(planet=>{

const data=planet.userData

const angle=time*data.speed*100

planet.position.x=Math.cos(angle)*data.distance
planet.position.z=Math.sin(angle)*data.distance

})

controls.update()

renderer.render(scene,camera)

}

animate()


// RESIZE

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
